<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart.js Zoomable Chart (Fixed Height)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .chart-wrapper {
            position: relative;
            height: 500px;           /* ← Fixed height prevents growing */
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .controls {
            margin: 15px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            padding: 8px 16px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background: #4338ca;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chart.js Zoomable Line Chart</h1>
        <p><strong>Mouse Wheel Zoom (X + Y) • Drag to Pan • Double-click to reset</strong></p>
        
        <div class="controls">
            <button onclick="resetZoom()">Reset Zoom</button>
            <button onclick="toggleWheelZoom()">Toggle Wheel Zoom</button>
        </div>

        <div class="chart-wrapper">
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <script>
        Chart.register(window.ChartZoom);

        const ctx = document.getElementById('myChart');

        // Sample data
        function generateData() {
            const labels = [];
            const data1 = [];
            const data2 = [];
            for (let i = 0; i < 100; i++) {
                labels.push(i);
                data1.push(Math.sin(i / 5) * 50 + 50 + Math.random() * 20);
                data2.push(Math.cos(i / 7) * 40 + 60 + Math.random() * 30);
            }
            return { labels, data1, data2 };
        }

        const { labels, data1, data2 } = generateData();

        const myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Dataset A',
                        data: data1,
                        borderColor: '#4f46e5',
                        backgroundColor: 'rgba(79, 70, 229, 0.1)',
                        tension: 0.3,
                        borderWidth: 3
                    },
                    {
                        label: 'Dataset B',
                        data: data2,
                        borderColor: '#ec4899',
                        backgroundColor: 'rgba(236, 72, 153, 0.1)',
                        tension: 0.3,
                        borderWidth: 3
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,   // safe now because of fixed wrapper height
                interaction: {
                    mode: 'index',
                    intersect: false,
                },
                plugins: {
                    legend: { position: 'top' },
                    title: {
                        display: true,
                        text: 'Mouse Wheel Zoom on X & Y Axes'
                    },
                    zoom: {
                        pan: {
                            enabled: true,
                            mode: 'xy'
                        },
                        zoom: {
                            wheel: {
                                enabled: true,
                                speed: 0.1
                            },
                            pinch: {
                                enabled: true
                            },
                            mode: 'xy'
                        }
                    }
                },
                scales: {
                    x: { title: { display: true, text: 'X Axis' } },
                    y: { title: { display: true, text: 'Y Axis' } }
                }
            }
        });

        function resetZoom() {
            myChart.resetZoom();
        }

        function toggleWheelZoom() {
            const zoomOpts = myChart.options.plugins.zoom.zoom;
            zoomOpts.wheel.enabled = !zoomOpts.wheel.enabled;
            myChart.update();
            alert(`Wheel zoom ${zoomOpts.wheel.enabled ? 'ENABLED' : 'DISABLED'}`);
        }
    </script>
</body>
</html>
