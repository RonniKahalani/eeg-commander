<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrainBit - Web Bluetooth</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen p-8">

  <div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold mb-6">🧠 BrainBit Web Bluetooth</h1>
    
    <button onclick="connectBrainBit()" 
            class="px-6 py-3 bg-blue-600 hover:bg-blue-700 rounded-2xl font-medium">
      Connect to BrainBit
    </button>

    <div id="status" class="mt-6 p-4 bg-gray-900 rounded-2xl"></div>

    <div class="grid grid-cols-5 gap-4 mt-8">
      <div id="delta"  class="bg-gray-900 p-6 rounded-3xl text-center">Delta<br><span class="text-2xl">--</span></div>
      <div id="theta"  class="bg-gray-900 p-6 rounded-3xl text-center">Theta<br><span class="text-2xl">--</span></div>
      <div id="alpha"  class="bg-gray-900 p-6 rounded-3xl text-center">Alpha<br><span class="text-2xl">--</span></div>
      <div id="beta"   class="bg-gray-900 p-6 rounded-3xl text-center">Beta<br><span class="text-2xl">--</span></div>
      <div id="gamma"  class="bg-gray-900 p-6 rounded-3xl text-center">Gamma<br><span class="text-2xl">--</span></div>
    </div>
  </div>

  <script>
    let device, characteristic;

    async function connectBrainBit() {
      try {
        document.getElementById('status').innerHTML = "🔍 Looking for BrainBit...";

        device = await navigator.bluetooth.requestDevice({
          filters: [{ namePrefix: 'BrainBit' }],
          optionalServices: ['0000fff0-0000-1000-8000-00805f9b34fb']
        });

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService('0000fff0-0000-1000-8000-00805f9b34fb');
        characteristic = await service.getCharacteristic('0000fff1-0000-1000-8000-00805f9b34fb');

        characteristic.addEventListener('characteristicvaluechanged', handleEEGData);
        await characteristic.startNotifications();

        document.getElementById('status').innerHTML = `✅ Connected to ${device.name}`;

      } catch (err) {
        document.getElementById('status').innerHTML = `❌ Error: ${err.message}`;
        console.error(err);
      }
    }

    function handleEEGData(event) {
      const value = new DataView(event.target.value.buffer);
      
      // BrainBit typically sends 4 channels + other data
      const ch1 = value.getFloat32(0, true);
      const ch2 = value.getFloat32(4, true);
      const ch3 = value.getFloat32(8, true);
      const ch4 = value.getFloat32(12, true);

      // Simple band estimation (for demo - in real use, use proper FFT)
      const alpha = (ch1 + ch2) / 2 * 0.6 + 0.5;
      const beta  = (ch3 + ch4) / 2 * 0.7 + 0.5;
      const theta = Math.abs(ch1 - ch2) * 0.8;
      const delta = Math.min(1, Math.max(0, (ch1 + ch3) / 2 * 0.4));
      const gamma = Math.max(alpha, beta) * 0.9;

      document.getElementById('delta').querySelector('span').textContent = delta.toFixed(2);
      document.getElementById('theta').querySelector('span').textContent = theta.toFixed(2);
      document.getElementById('alpha').querySelector('span').textContent = alpha.toFixed(2);
      document.getElementById('beta').querySelector('span').textContent  = beta.toFixed(2);
      document.getElementById('gamma').querySelector('span').textContent = gamma.toFixed(2);
    }
  </script>
</body>
</html>
